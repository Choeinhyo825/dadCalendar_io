<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="아빠 달력" />
    <title>아빠 달력</title>
    <link rel="icon" href="icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <div id="file-protocol-hint" class="file-hint" hidden>
      <p>
        <strong>달력 숫자가 안 보이면</strong> HTML 파일을 직접 연 상태일 수 있습니다.
        PowerShell에서 <code>.\scripts\serve-local.ps1</code> 실행 후
        <a href="http://localhost:8080/">http://localhost:8080</a> (또는 스크립트가 안내한 포트)로 접속하세요.
      </p>
    </div>
    <div class="app">
      <div class="card">
        <div class="toolbar">
          <div class="month-nav">
            <button type="button" class="icon-btn" id="btn-prev" aria-label="이전 달">‹</button>
            <button type="button" class="month-title" id="month-title" aria-label="연·월 선택">2026년 1월</button>
            <button type="button" class="icon-btn" id="btn-next" aria-label="다음 달">›</button>
          </div>
          <div class="toolbar-actions">
            <button type="button" class="icon-btn" id="btn-settings" aria-label="기준일 설정">⚙</button>
          </div>
        </div>

        <div class="weekdays" aria-hidden="true">
          <span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span>
        </div>
        <div class="grid" id="calendar-grid" role="grid" aria-label="근무 달력"></div>
      </div>

      <div class="go-today-row">
        <button type="button" class="text-btn" id="btn-go-today">오늘로 이동</button>
      </div>

      <div class="card legend">
        <h2>표시 안내</h2>
        <div class="legend-grid">
          <div class="legend-item">
            <span class="swatch swatch-regular"></span>
            <div>
              <div>일반 근무</div>
              <div class="legend-caption">테두리 사각형</div>
            </div>
          </div>
          <div class="legend-item">
            <span class="swatch swatch-duty"></span>
            <div>
              <div>당직</div>
              <div class="legend-caption">채움 사각형</div>
            </div>
          </div>
          <div class="legend-item">
            <span class="swatch swatch-today">31</span>
            <div>
              <div>오늘</div>
              <div class="legend-caption">붉은 원·흰 숫자</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <dialog id="dlg-month">
      <div class="dialog-body">
        <h2>연·월 선택</h2>
        <div class="picker-row">
          <select id="pick-year" aria-label="연도"></select>
          <select id="pick-month" aria-label="월">
            <option value="1">1월</option>
            <option value="2">2월</option>
            <option value="3">3월</option>
            <option value="4">4월</option>
            <option value="5">5월</option>
            <option value="6">6월</option>
            <option value="7">7월</option>
            <option value="8">8월</option>
            <option value="9">9월</option>
            <option value="10">10월</option>
            <option value="11">11월</option>
            <option value="12">12월</option>
          </select>
        </div>
        <div class="dialog-actions">
          <button type="button" class="btn-secondary" id="month-pick-cancel">취소</button>
          <button type="button" class="btn-primary" id="month-pick-ok">확인</button>
        </div>
      </div>
    </dialog>

    <dialog id="dlg-settings">
      <div class="dialog-body">
        <h2>기준일 설정</h2>
        <div class="field">
          <label for="anchor-date">기준 날짜</label>
          <input type="date" id="anchor-date" />
        </div>
        <div class="field">
          <label>그날의 근무</label>
          <div class="radio-row">
            <label><input type="radio" name="anchor-shift" value="REGULAR" checked /> 일반 근무</label>
            <label><input type="radio" name="anchor-shift" value="ON_DUTY" /> 당직</label>
          </div>
        </div>
        <div class="dialog-actions">
          <button type="button" class="btn-secondary" id="settings-cancel">취소</button>
          <button type="button" class="btn-primary" id="settings-save">저장</button>
        </div>
      </div>
    </dialog>

    <script>
      if (location.protocol === "file:") {
        document.getElementById("file-protocol-hint").hidden = false;
      }
    </script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
